volumes:
  mysql-volume:
    driver: local

services:
  spid-mysql:
    image: mysql:8.4 # Latest supported version -> https://www.keycloak.org/server/supported-configurations
    container_name: "spid-mysql"
    networks:
      - spid-local-network
    ports:
      - 3306:3306
    environment:
      MYSQL_ROOT_PASSWORD: ${SPID_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${SPID_DB_SCHEMA}
      MYSQL_USER: ${SPID_DB_USERNAME}
      MYSQL_PASSWORD: ${SPID_DB_PASSWORD}
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mysql-volume:/var/lib/mysql
