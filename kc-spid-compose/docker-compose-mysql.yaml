volumes:
  mysql-volume:
    driver: local

services:
  spid-mysql:
    image: mysql:5.7.44 # Ultima versione con default unicode utf8mb3
    restart: always
    container_name: "spid-mysql"
    networks:
      - spid-local-network
    ports:
      - 3306:3306
    environment:
      MYSQL_ROOT_PASSWORD: ${SPID_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${SPID_DB_SCHEMA}
      MYSQL_USER: ${SPID_DB_USERNAME}
      MYSQL_PASSWORD: ${SPID_DB_PASSWORD}
    volumes:
      - mysql-volume:/var/lib/mysql
